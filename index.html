<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/svg-xml" href="img\ligi.svg">
    <link rel="stylesheet" href="styles\style.css">


    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pass&Phrase Generator</title>
</head>

<body>

    <div class="container">
        <aside>
            <section class="controls-grid">
                <div class="tab-nav">
                    <button id="tab-btn-passphrase" class="active" onclick="switchTab('passphrase')">🔑
                        Passphrase</button>
                    <button id="tab-btn-password" onclick="switchTab('password')">🔐 Password</button>
                </div>

                <!-- ===== PASSPHRASE TAB ===== -->
                <div id="tab-passphrase" class="tab-content active">
                    <div class="control-group">
                        <label>Wordlist</label>
                        <select id="opt-wordlist">
                            <option value="any">Any</option>
                            <option value="short">Short (≤4 chars)</option>
                            <option value="long">Long (≥7 chars)</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label>Number of Words: <span id="val-words">4</span></label>
                        <input type="range" id="opt-words" min="1" max="20" value="2">
                    </div>

                    <div class="control-group">
                        <label>Separator</label>
                        <div class="flex-wrap">
                            <button class="outline btn-sep" data-val=".">.</button>
                            <button class="outline btn-sep" data-val="_">_</button>
                            <button class="outline btn-sep" data-val="-">-</button>
                            <button class="outline btn-sep" data-val=" ">space</button>
                            <input type="text" id="opt-sep-custom" placeholder="Custom" style="width: 70px;">
                        </div>
                    </div>

                    <div class="control-group">
                        <label class="group-title">Capitalization</label>
                        <div class="radio-row">
                            <input type="radio" name="cap" id="cap-low" value="nocap">
                            <label for="cap-low">low</label>
                            <input type="radio" name="cap" id="cap-title" value="title" checked>
                            <label for="cap-title">Title</label>
                            <input type="radio" name="cap" id="cap-upper" value="upper">
                            <label for="cap-upper">ALL</label>
                            <input type="radio" name="cap" id="cap-random" value="random">
                            <label for="cap-random">rAndOm</label>
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Numbers</label>
                        <select id="opt-num-pos">
                            <option value="off">Disabled</option>
                            <option value="each">After each word</option>
                            <option value="end">After last word</option>
                        </select>
                        <div id="num-digits-wrap" class="hidden">
                            <label>Digits: <span id="val-digits">2</span></label>
                            <input type="range" id="opt-digits" min="1" max="10" value="2">
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Digitalizer
                            <div style="font-size: 0.75rem; color: var(--secondary); margin-top: 4px;">
                                Change some letters to digits: i→1 b→8 s→5 etc.
                            </div>
                        </label>
                        <select id="opt-digitalaizer-pos">
                            <option value="off">Disabled</option>
                            <option value="on">Enabled</option>
                        </select>
                        <div id="num-digitalaizer-wrap" class="hidden">
                            <label>%: <span id="val-digitalaizer">0</span></label>
                            <input type="range" id="opt-digitalaizerRatio" min="10" max="100" value="10" step="10">
                        </div>
                    </div>

                    <div class="control-group">
                        <label>
                            Random Special Symbols
                            <div style="font-size: 0.75rem; color: var(--secondary); margin-top: 4px;">
                                Pool: ! ? = + @ # $ % ^ &amp; * ( ) / \ &lt; &gt; ; : [ ] { }
                            </div>
                        </label>
                        <select id="opt-symbol-pos">
                            <option value="off">Disabled</option>
                            <option value="start">At the start</option>
                            <option value="each">After each word</option>
                            <option value="end">At the end</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label>Generate Count:</label>
                        <input type="number" id="opt-count" min="1" max="100" value="5">
                    </div>
                </div>

                <!-- ===== PASSWORD TAB ===== -->
                <div id="tab-password" class="tab-content">
                    <div class="control-group">
                        <label>Length: <span id="val-pw-length">16</span></label>
                        <input type="range" id="opt-pw-length" min="4" max="128" value="16">
                    </div>

                    <div class="control-group">
                        <div class="checkbox-row">
                            <input type="checkbox" id="opt-pw-upper" checked>
                            <label for="opt-pw-upper">Uppercase (A-Z)</label>
                        </div>
                    </div>

                    <div class="control-group">
                        <div class="checkbox-row">
                            <input type="checkbox" id="opt-pw-lower" checked>
                            <label for="opt-pw-lower">Lowercase (a-z)</label>
                        </div>
                    </div>

                    <div class="control-group">
                        <div class="checkbox-row">
                            <input type="checkbox" id="opt-pw-digits" checked>
                            <label for="opt-pw-digits">Digits (0-9)</label>
                        </div>
                    </div>

                    <div class="control-group">
                        <div class="checkbox-row">
                            <input type="checkbox" id="opt-pw-symbols" checked>
                            <label for="opt-pw-symbols">Special Symbols (!@#$%...)</label>
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Generate Count:</label>
                        <input type="number" id="opt-pw-count" min="1" max="100" value="5">
                    </div>
                </div>
            </section>
        </aside>

        <main>

            <section>
                <button id="btn-generate" style="width: 100%; padding: 15px; font-size: 1.1rem;">🔐 Generate some
                    passwords</button>
                <hr>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h2 style="margin:0">Results</h2>
                    <div class="row">
                        <button class="secondary" id="btn-copy-all">Copy All</button>
                        <button class="secondary" id="btn-export-results">Export CSV</button>
                    </div>
                </div>
                <div id="results-container" class="results-list"></div>
                <div id="warning-box" style="color: #e11d48; font-size: 0.8rem; margin-top: 10px;" class="hidden">
                    Warning: Wordlist too small, words may repeat.</div>
            </section>

            <section class="history-pane">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <div style="display: flex; align-items: center; gap: 6px;">
                        <input type="checkbox" id="opt-save-history"
                            style="width:15px;height:15px;accent-color:var(--primary);cursor:pointer;"
                            title="Save history for next start">
                        <h3 style="margin:0">History</h3>
                    </div>
                    <div class="row">
                        <button class="ou`tline" id="btn-export-history"
                            style="font-size: 0.7rem; padding: 4px 8px;">Export CSV</button>
                        <button class="outline" id="btn-clear-history"
                            style="font-size: 0.7rem; padding: 4px 8px;">Clear</button>
                    </div>
                </div>
                <div id="history-list"></div>
            </section>
        </main>
        Pass&Phrase Generator v.0.8 - VibeCoded by Ivan Rieznyk
        <div class="row">
            <select id="themeSelect" aria-label="Toggle Theme">
                <option value="system">System</option>
                <option value="light">Light</option>
                <option value="dark">Dark</option>
            </select>
        </div>

    </div>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script src="js/words.js"></script>
    <script src="js/main.js"></script>

</body>

</html>
