    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Secure Passphrase Generator</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --primary: #2563eb;
            --secondary: #64748b;
            --border: #e2e8f0;
            --card-bg: #f8fafc;
            --toast-bg: #1e293b;
            --toast-text: #ffffff;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --text: #f1f5f9;
            --primary: #3b82f6;
            --secondary: #94a3b8;
            --border: #334155;
            --card-bg: #1e293b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            line-height: 1.5;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 24px;
        }

        @media (max-width: 850px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 1rem;
        }

        section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .controls-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="text"],
        select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
        }

        button {
            cursor: pointer;
            padding: 10px 16px;
            border-radius: 6px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button.secondary {
            background: var(--secondary);
        }

        button.outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .results-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .passphrase-item {
            background: var(--bg);
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            word-break: break-all;
        }

        .history-pane {
            margin-top: 24px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.85rem;
        }

        .history-item {
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--toast-bg);
            color: var(--toast-text);
            padding: 12px 24px;
            border-radius: 8px;
            transform: translateY(100px);
            transition: transform 0.3s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
        }

        .hidden {
            display: none;
        }

        .flex-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }



        /* 1. Layout the group */
        .radio-row {
            display: flex;
            flex-flow: row nowrap;
            gap: 0;
            /* No gap for connected buttons */
        }

        /* 2. Hide the actual radio circle */
        .radio-row input[type="radio"] {
            display: none;
        }

        /* 3. Style the labels to look like buttons */
        .radio-row label {
            cursor: pointer;
            padding: 10px 20px;
            background-color: var(--bg);
            border: 1px solid #ccc;
            border-right: none;
            /* Prevent double borders */
            font-family: sans-serif;
            font-size: 14px;
            transition: background-color 0.2s;
            user-select: none;
            /* Prevents text highlighting */
        }

        /* 4. Add borders back to the last item and round the corners */
        .radio-row label:first-of-type {
            border-top-left-radius: 5px;
            border-bottom-left-radius: 5px;
        }

        .radio-row label:last-of-type {
            border-right: 1px solid #ccc;
            border-top-right-radius: 5px;
            border-bottom-right-radius: 5px;
        }

        /* 5. The "Active/Checked" State */
        .radio-row input[type="radio"]:checked+label {
            background-color: var(--primary);
            /* Blue active color */
            color: white;
            border-color: var(--secondary);
        }

        /* Optional: Hover effect */
        .radio-row label:hover {
            background-color: var(--card-bg);
        }

        .radio-row input[type="radio"]:checked+label:hover {
            background-color: #0069d9;
        }

        /* Style for the main label above */
        .group-title {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        /* Tab navigation */
        .tab-nav {
            display: flex;
            gap: 0;
            margin-bottom: 16px;
            border-bottom: 2px solid var(--border);
        }

        .tab-nav button {
            flex: 1;
            padding: 10px 16px;
            background: transparent;
            color: var(--secondary);
            border: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }

        .tab-nav button.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-nav button:hover:not(.active) {
            color: var(--text);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Number input for count */
        input[type="number"] {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            width: 80px;
            font-size: 0.95rem;
        }

        input[type="number"]:focus {
            outline: 2px solid var(--primary);
            outline-offset: -1px;
        }

        /* Checkbox row */
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .checkbox-row label {
            font-weight: 500;
            cursor: pointer;
        }

        input[type="range"] {
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="container">
        <aside>
            <section class="controls-grid">
                <div class="tab-nav">
                    <button id="tab-btn-passphrase" class="active" onclick="switchTab('passphrase')">🔑
                        Passphrase</button>
                    <button id="tab-btn-password" onclick="switchTab('password')">🔐 Password</button>
                </div>

                <!-- ===== PASSPHRASE TAB ===== -->
                <div id="tab-passphrase" class="tab-content active">
                    <div class="control-group">
                        <label>Wordlist</label>
                        <select id="opt-wordlist">
                            <option value="any">Any</option>
                            <option value="short">Short (≤4 chars)</option>
                            <option value="long">Long (≥7 chars)</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label>Number of Words: <span id="val-words">4</span></label>
                        <input type="range" id="opt-words" min="1" max="20" value="2">
                    </div>

                    <div class="control-group">
                        <label>Separator</label>
                        <div class="flex-wrap">
                            <button class="outline btn-sep" data-val=".">.</button>
                            <button class="outline btn-sep" data-val="_">_</button>
                            <button class="outline btn-sep" data-val="-">-</button>
                            <button class="outline btn-sep" data-val=" ">space</button>
                            <input type="text" id="opt-sep-custom" placeholder="Custom" style="width: 70px;">
                        </div>
                    </div>

                    <div class="control-group">
                        <label class="group-title">Capitalization</label>
                        <div class="radio-row">
                            <input type="radio" name="cap" id="cap-low" value="nocap">
                            <label for="cap-low">low</label>
                            <input type="radio" name="cap" id="cap-title" value="title" checked>
                            <label for="cap-title">Title</label>
                            <input type="radio" name="cap" id="cap-upper" value="upper">
                            <label for="cap-upper">ALL</label>
                            <input type="radio" name="cap" id="cap-random" value="random">
                            <label for="cap-random">rAndOm</label>
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Numbers</label>
                        <select id="opt-num-pos">
                            <option value="off">Disabled</option>
                            <option value="each">After each word</option>
                            <option value="end">After last word</option>
                        </select>
                        <div id="num-digits-wrap" class="hidden">
                            <label>Digits: <span id="val-digits">2</span></label>
                            <input type="range" id="opt-digits" min="1" max="10" value="2">
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Digitalizer
                            <div style="font-size: 0.75rem; color: var(--secondary); margin-top: 4px;">
                                Change some letters to digits: i→1 b→8 s→5 etc.
                            </div>
                        </label>
                        <select id="opt-digitalaizer-pos">
                            <option value="off">Disabled</option>
                            <option value="on">Enabled</option>
                        </select>
                        <div id="num-digitalaizer-wrap" class="hidden">
                            <label>%: <span id="val-digitalaizer">0</span></label>
                            <input type="range" id="opt-digitalaizerRatio" min="10" max="100" value="10" step="10">
                        </div>
                    </div>

                    <div class="control-group">
                        <label>
                            Random Special Symbols
                            <div style="font-size: 0.75rem; color: var(--secondary); margin-top: 4px;">
                                Pool: ! ? = + @ # $ % ^ &amp; * ( ) / \ &lt; &gt; ; : [ ] { }
                            </div>
                        </label>
                        <select id="opt-symbol-pos">
                            <option value="off">Disabled</option>
                            <option value="start">At the start</option>
                            <option value="each">After each word</option>
                            <option value="end">At the end</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label>Generate Count:</label>
                        <input type="number" id="opt-count" min="1" max="100" value="5">
                    </div>
                </div>

                <!-- ===== PASSWORD TAB ===== -->
                <div id="tab-password" class="tab-content">
                    <div class="control-group">
                        <label>Length: <span id="val-pw-length">16</span></label>
                        <input type="range" id="opt-pw-length" min="4" max="128" value="16">
                    </div>

                    <div class="control-group">
                        <div class="checkbox-row">
                            <input type="checkbox" id="opt-pw-upper" checked>
                            <label for="opt-pw-upper">Uppercase (A-Z)</label>
                        </div>
                    </div>

                    <div class="control-group">
                        <div class="checkbox-row">
                            <input type="checkbox" id="opt-pw-lower" checked>
                            <label for="opt-pw-lower">Lowercase (a-z)</label>
                        </div>
                    </div>

                    <div class="control-group">
                        <div class="checkbox-row">
                            <input type="checkbox" id="opt-pw-digits" checked>
                            <label for="opt-pw-digits">Digits (0-9)</label>
                        </div>
                    </div>

                    <div class="control-group">
                        <div class="checkbox-row">
                            <input type="checkbox" id="opt-pw-symbols" checked>
                            <label for="opt-pw-symbols">Special Symbols (!@#$%...)</label>
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Generate Count:</label>
                        <input type="number" id="opt-pw-count" min="1" max="100" value="5">
                    </div>
                </div>
            </section>
        </aside>

        <main>

            <section>
                <button id="btn-generate" style="width: 100%; padding: 15px; font-size: 1.1rem;">🔐 Generate some
                    passwords</button>
                <hr>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h2 style="margin:0">Results</h2>
                    <div class="row">
                        <button class="secondary" id="btn-copy-all">Copy All</button>
                        <button class="secondary" id="btn-export-results">Export CSV</button>
                    </div>
                </div>
                <div id="results-container" class="results-list"></div>
                <div id="warning-box" style="color: #e11d48; font-size: 0.8rem; margin-top: 10px;" class="hidden">
                    Warning: Wordlist too small, words may repeat.</div>
            </section>

            <section class="history-pane">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h3 style="margin:0">History</h3>
                    <div class="row">
                        <button class="ou`tline" id="btn-export-history"
                            style="font-size: 0.7rem; padding: 4px 8px;">Export CSV</button>
                        <button class="outline" id="btn-clear-history"
                            style="font-size: 0.7rem; padding: 4px 8px;">Clear</button>
                    </div>
                </div>
                <div id="history-list"></div>
            </section>
        </main>
        <div class="row">
            <select id="themeSelect" aria-label="Toggle Theme">
                <option value="system">System</option>
                <option value="light">Light</option>
                <option value="dark">Dark</option>
            </select>
        </div>

        function generatePassphrases() {
            let pool = [...MASTER_WORDS];
            if (state.wordlist === 'short') pool = pool.filter(w => w.length <= 4);
            if (state.wordlist === 'long') pool = pool.filter(w => w.length >= 7);

            document.getElementById('warning-box').classList.toggle('hidden', pool.length >= state.words * 2);

            const separator = state.customSep || state.separator;
            const results = [];

            for (let i = 0; i < state.count; i++) {
                let parts = [];
                for (let j = 0; j < state.words; j++) {
                    let word = pool[getSecureInt(0, pool.length - 1)];
                    word = applyCap(word, state.cap);

                    if (state.numPos === 'each') word += getRandomDigitString(state.digits);
                    if (state.symbolPos === 'each') word += getRandomSymbol();

                    parts.push(word);
                }

                let phrase = parts.join(separator);

                if (state.numPos === 'end') phrase += getRandomDigitString(state.digits);
                if (state.symbolPos === 'start') phrase = getRandomSymbol() + phrase;
                if (state.symbolPos === 'end') phrase = phrase + getRandomSymbol();

                if (state.digitalaizer === "on") phrase = leetTransform(phrase, state.digitalaizerRatio / 100);
                results.push(phrase);
            }

            state.results = results;
            renderResults();
            saveState();
        }


        function leetTransform(text, probability = 0.5, rng = Math.random) {
            if (typeof text !== 'string') throw new TypeError('text must be a string');
            if (typeof probability !== 'number' || probability < 0 || probability > 1) {

                throw new RangeError('probability must be a number between 0 and 1');
            }
            if (typeof rng !== 'function') throw new TypeError('rng must be a function');
            console.log(probability)
            const map = {
                a: '4', A: '4', e: '3', E: '3', i: '1', I: '1', o: '0',
                O: '0', s: '5', S: '5', b: '8', B: '8', g: '6', G: '6',
            };

            let out = '';
            for (let i = 0; i < text.length; i++) {
                const ch = text[i];
                if (map[ch] && rng() < probability) {
                    out += map[ch];
                } else {
                    out += ch;
                }
            }
            return out;
        }

        function switchTab(tab) {
            state.activeTab = tab;
            document.getElementById('tab-passphrase').classList.toggle('active', tab === 'passphrase');
            document.getElementById('tab-password').classList.toggle('active', tab === 'password');
            document.getElementById('tab-btn-passphrase').classList.toggle('active', tab === 'passphrase');
            document.getElementById('tab-btn-password').classList.toggle('active', tab === 'password');
            saveState();
        }

        function generatePasswords() {
            const UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const LOWER = 'abcdefghijklmnopqrstuvwxyz';
            const DIGS = '0123456789';
            const SPEC = '!@#$%^&*()_+-=[]{}|;:,.?/~';

            let charset = '';
            if (state.pwUpper) charset += UPPER;
            if (state.pwLower) charset += LOWER;
            if (state.pwDigits) charset += DIGS;
            if (state.pwSymbols) charset += SPEC;

            if (charset.length === 0) {
                showToast('Enable at least one character set!', true);
                return;
            }

            const results = [];
            for (let i = 0; i < state.pwCount; i++) {
                const required = [];
                // Mandatory character types
                required.push(UPPER[getSecureInt(0, UPPER.length - 1)]);
                required.push(LOWER[getSecureInt(0, LOWER.length - 1)]);
                required.push(SPEC[getSecureInt(0, SPEC.length - 1)]);
                
                if (state.pwDigits) required.push(DIGS[getSecureInt(0, DIGS.length - 1)]);

                let pw = '';
                const remaining = Math.max(0, state.pwLength - required.length);
                for (let j = 0; j < remaining; j++) {
                    pw += charset[getSecureInt(0, charset.length - 1)];
                }
                let arr = pw.split('');
                for (const ch of required) {
                    arr.splice(getSecureInt(0, arr.length), 0, ch);
                }
                results.push(arr.join(''));
            }

            state.results = results;
            renderResults();
            saveState();
        }

        function generate() {
            if (state.activeTab === 'password') generatePasswords();
            else generatePassphrases();
        }

        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                showToast("Copied to clipboard!");
                addToHistory(text);
            } catch (err) { showToast("Copy failed", true); }
        }

        function addToHistory(text) {
            const entry = {
                timestamp: new Date().toISOString().replace('T', ' ').split('.')[0],
                phrase: text
            };
            state.history.unshift(entry);
            if (state.history.length > 100) state.history.pop();
            renderHistory();
            saveState();
        }

        function exportCSV(filename, headers, dataRows) {
            let csvContent = headers.join(",") + "\n" + dataRows.map(row => row.join(",")).join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast(`Exported ${filename}`);
        }

        function renderResults() {
            const container = document.getElementById('results-container');
            container.innerHTML = '';
            state.results.forEach(p => {
                const div = document.createElement('div');
                div.className = 'passphrase-item';
                div.innerHTML = `
            <span style="font-family: monospace; font-size: 1.1rem;">${p}</span>
            <button class="outline" onclick="copyToClipboard('${p.replace(/'/g, "\\'").replace(/\\/g, "\\\\")}')">Copy</button>
        `;
                container.appendChild(div);
            });
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            container.innerHTML = '';
            state.history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
            <span style="color: var(--secondary);">${item.timestamp}</span>
            <span style="font-weight: 500;">${item.phrase}</span>
        `;
                container.appendChild(div);
            });
        }

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.background = isError ? '#ef4444' : 'var(--toast-bg)';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function applyTheme() {
            let theme = state.theme;
            if (theme === 'system') theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', theme);
        }

        function init() {
            loadState();

            const setVal = (id, val) => {
                const el = document.getElementById(id);
                if (!el) return;
                if (el.type === 'range' || el.type === 'text' || el.type === 'number' || el.tagName === 'SELECT') el.value = val;
            };

            setVal('opt-wordlist', state.wordlist);
            setVal('opt-words', state.words);
            document.getElementById('val-words').innerText = state.words;
            setVal('opt-sep-custom', state.customSep);

            setVal('opt-num-pos', state.numPos);
            setVal('opt-digits', state.digits);

            setVal('opt-digitalaizer-pos', state.digitalaizer);
            setVal('opt-digitalaizerRatio', state.digitalaizerRatio);


            document.getElementById('val-digits').innerText = state.digits;
            document.getElementById('val-digitalaizer').innerText = state.digitalaizerRatio;

            document.getElementById('num-digits-wrap').classList.toggle('hidden', state.numPos === 'off');
            document.getElementById('num-digitalaizer-wrap').classList.toggle('hidden', state.digitalaizer === 'off');
            setVal('opt-symbol-pos', state.symbolPos);
            setVal('opt-count', state.count);
            setVal('themeSelect', state.theme);

            document.querySelectorAll(`input[name="cap"][value="${state.cap}"]`).forEach(el => el.checked = true);

            document.getElementById('opt-wordlist').onchange = (e) => state.wordlist = e.target.value;
            document.getElementById('opt-words').oninput = (e) => {
                state.words = parseInt(e.target.value);
                document.getElementById('val-words').innerText = state.words;
            };
            document.querySelectorAll('.btn-sep').forEach(btn => {
                btn.onclick = () => {
                    state.separator = btn.dataset.val;
                    state.customSep = '';
                    document.getElementById('opt-sep-custom').value = '';
                    showToast(`Separator set to "${state.separator === ' ' ? 'Space' : state.separator}"`);
                };
            });
            document.getElementById('opt-sep-custom').oninput = (e) => state.customSep = e.target.value;
            document.getElementsByName('cap').forEach(el => { el.onchange = (e) => state.cap = e.target.value; });


            document.getElementById('opt-num-pos').onchange = (e) => {
                state.numPos = e.target.value;
                document.getElementById('num-digits-wrap').classList.toggle('hidden', state.numPos === 'off');
            };
            document.getElementById('opt-digits').oninput = (e) => {
                state.digits = parseInt(e.target.value);
                document.getElementById('val-digits').innerText = state.digits;
            };


            // digitizer
            document.getElementById('opt-digitalaizer-pos').onchange = (e) => {
                state.digitalaizer = e.target.value;
                document.getElementById('num-digitalaizer-wrap').classList.toggle('hidden', state.digitalaizer === 'off');
            };
            document.getElementById('opt-digitalaizerRatio').oninput = (e) => {
                state.digitalaizerRatio = parseInt(e.target.value);
                document.getElementById('val-digitalaizer').innerText = state.digitalaizerRatio;
            };







            document.getElementById('opt-symbol-pos').onchange = (e) => state.symbolPos = e.target.value;
            document.getElementById('opt-count').oninput = (e) => {
                state.count = Math.max(1, parseInt(e.target.value) || 1);
            };

            // Password tab handlers
            document.getElementById('opt-pw-length').oninput = (e) => {
                state.pwLength = parseInt(e.target.value);
                document.getElementById('val-pw-length').innerText = state.pwLength;
            };
            document.getElementById('opt-pw-upper').onchange = (e) => state.pwUpper = e.target.checked;
            document.getElementById('opt-pw-lower').onchange = (e) => state.pwLower = e.target.checked;
            document.getElementById('opt-pw-digits').onchange = (e) => state.pwDigits = e.target.checked;
            document.getElementById('opt-pw-symbols').onchange = (e) => state.pwSymbols = e.target.checked;
            document.getElementById('opt-pw-count').oninput = (e) => {
                state.pwCount = Math.max(1, parseInt(e.target.value) || 1);
            };
            document.getElementById('themeSelect').onchange = (e) => {
                state.theme = e.target.value;
                applyTheme();
                saveState();
            };

            document.getElementById('btn-generate').onclick = generate;
            document.getElementById('btn-copy-all').onclick = () => {
                if (state.results.length === 0) return;
                copyToClipboard(state.results.join('\n'));
            };
            document.getElementById('btn-clear-history').onclick = () => {
                state.history = [];
                renderHistory();
                saveState();
            };
            document.getElementById('btn-export-results').onclick = () => {
                exportCSV("passphrase_results.csv", ["passphrase"], state.results.map(r => [r]));
            };
            document.getElementById('btn-export-history').onclick = () => {
                exportCSV("passphrase_history.csv", ["timestamp", "passphrase"], state.history.map(h => [h.timestamp, h.phrase]));
            };

            // Restore password tab state
            document.getElementById('opt-pw-length').value = state.pwLength;
            document.getElementById('val-pw-length').innerText = state.pwLength;
            
            // Enforce mandatory settings in UI
            document.getElementById('opt-pw-upper').checked = true;
            document.getElementById('opt-pw-upper').disabled = true;
            document.getElementById('opt-pw-lower').checked = true;
            document.getElementById('opt-pw-lower').disabled = true;
            document.getElementById('opt-pw-symbols').checked = true;
            document.getElementById('opt-pw-symbols').disabled = true;
            
            document.getElementById('opt-pw-digits').checked = state.pwDigits;
            document.getElementById('opt-pw-count').value = state.pwCount;

            // Restore active tab
            switchTab(state.activeTab || 'passphrase');

            applyTheme();
            renderHistory();
            generate();
        }

        window.onload = init;
    </script>
</body>

</html>
