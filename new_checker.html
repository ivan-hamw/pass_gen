<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      margin: 20px;
    }

    .container {
      width: 60px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .button {
      font-size: 14px;
      font-size: 12px;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
      color: #000;
      box-shadow: inset 2px 2px 5px 2px rgba(0, 0, 0, 0.4);
      background: linear-gradient(135deg, rgb(157, 157, 157) 0%, rgb(80, 80, 80) 100%);
      width: 60px;
      height: 30px;
      border-radius: 200px;
      cursor: pointer;
      position: relative;
      transition: 1s;
    }

    .button::before {
      content: "";
      position: absolute;
      margin: 2px;
      width: 26px;
      height: 26px;

      background: radial-gradient(farthest-corner at 6px 6px,
          #ffffff 0%,
          #747474 50%,
          #dbdbdb 100%);
      border-radius: 50%;
      transition: 1s;
      z-index: 100;
    }

    input:checked+.button {
      color: #fff;
      box-shadow: inset 2px 2px 5px 2px rgba(0, 0, 0, 0.4);
      background: linear-gradient(135deg, rgba(255, 0, 151, 1) 0%, rgba(255, 118, 0, 1) 100%);
    }

    input:checked+.button::before {
      transform: translateX(30px);
      background: radial-gradient(farthest-corner at 6px 6px,
          #eaff00 0%,
          #ffba0c 50%,
          #f1ff86 100%);

    }

    input {
      display: none;
    }

    .switch_labels {
      position: relative;
      width: 42x;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5px;

      margin: 0 5px;
    }
  </style>
</head>

<body>

  <div class="switcher">
    <div class="tumbler"></div>
  </div>

  <div class="container">
    <input type="checkbox" id="check">
    <label for="check" class="button">
      <div class="switch_labels">
        <div>On</div>
        <div>Off</div>
    </label>
  </div>


</body>

</html>
